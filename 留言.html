<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易留言板</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f5f5f5;padding:20px;max-width:600px;margin:0 auto}
        .title{text-align:center;margin:20px 0;color:#333}
        .input-box{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
        input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
        button{background:#007bff;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
        .msg{background:white;padding:15px;margin:10px 0;border-radius:8px}
        .name{font-weight:bold;color:#007bff}
    </style>
</head>
<body>
    <h2 class="title">简易留言板</h2>
    <div class="input-box">
        <input type="text" id="name" placeholder="输入你的名字">
        <textarea id="content" placeholder="输入留言内容"></textarea>
        <button onclick="submitMsg()">提交留言</button>
    </div>
    <div id="msgList"></div>

<script>
// 本地留言功能，不需要服务器，打开就能用
function loadMsgs() {
    let list = JSON.parse(localStorage.getItem('msgs') || '[]');
    let html = '';
    list.forEach(item => {
        html += `
        <div class="msg">
            <div class="name">${item.name}</div>
            <p>${item.content}</p>
        </div>`;
    });
    document.getElementById('msgList').innerHTML = html;
}

function submitMsg() {
    let name = document.getElementById('name').value;
    let content = document.getElementById('content').value;
    if (!name || !content) {
        alert('请填写名字和内容');
        return;
    }
    let list = JSON.parse(localStorage.getItem('msgs') || '[]');
    list.unshift({ name, content });
    localStorage.setItem('msgs', JSON.stringify(list));
    document.getElementById('name').value = '';
    document.getElementById('content').value = '';
    loadMsgs();
}

loadMsgs();
</script>
</body>
</html>
