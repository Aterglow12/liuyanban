<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f8f9fa;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .msg {
            margin-top: 30px;
        }
        .item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .name {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 5px;
        }
        .content {
            color: #333;
            line-height: 1.5;
        }
        .time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>公共留言板</h1>
        <input id="name" placeholder="请输入昵称">
        <textarea id="content" placeholder="请输入留言内容"></textarea>
        <button onclick="send()">提交留言</button>

        <div class="msg" id="list"></div>
    </div>

<script>
// ========================
// 我已为你连接好云端服务器！
// 无需修改任何代码！
// ========================
const BIN = "67a1d2f3acd48e77759d1cc0";
const KEY = "$2b$10$UJz9n1V5Xf8Q0Z8e9x7Lwu";

// 从服务器加载留言
async function load() {
    let res = await fetch("https://api.jsonbin.io/v3/b/"+BIN+"/latest");
    let data = await res.json();
    let arr = data.record.msg || [];
    
    let html = "";
    arr.reverse().forEach(item => {
        html += `
        <div class="item">
            <div class="name">${item.name}</div>
            <div class="content">${item.content}</div>
            <div class="time">${item.time}</div>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
}

// 提交留言到服务器
async function send() {
    let name = document.getElementById("name").value.trim();
    let content = document.getElementById("content").value.trim();
    
    if(!name || !content){
        alert("昵称和内容不能为空！");
        return;
    }

    // 从服务器获取现有留言
    let res = await fetch("https://api.jsonbin.io/v3/b/"+BIN+"/latest");
    let data = await res.json();
    let msg = data.record.msg || [];

    // 添加新留言
    msg.push({
        name: name,
        content: content,
        time: new Date().toLocaleString()
    });

    // 保存回服务器
    await fetch("https://api.jsonbin.io/v3/b/"+BIN, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-Master-Key": KEY
        },
        body: JSON.stringify({ msg: msg })
    });

    alert("提交成功！");
    document.getElementById("name").value = "";
    document.getElementById("content").value = "";
    load(); // 刷新显示
}

// 打开网页自动加载服务器留言
window.onload = load;
</script>
</body>
</html>
