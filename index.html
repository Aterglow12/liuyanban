<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线留言板</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        body{background:#f8fafc;padding:2rem;max-width:650px;margin:0 auto}
        .container{max-width:600px;margin:0 auto}
        h1{text-align:center;color:#1e293b;margin-bottom:2rem;font-weight:600}
        .form-card{background:white;padding:1.5rem;border-radius:12px;box-shadow:0 1px 3px 0 rgba(0,0,0,0.1);margin-bottom:2rem}
        .form-group{margin-bottom:1rem}
        label{display:block;margin-bottom:0.5rem;color:#475569;font-weight:500}
        input,textarea{width:100%;padding:0.75rem;border:1px solid #e2e8f0;border-radius:8px;font-size:1rem;transition:border-color 0.2s}
        input:focus,textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
        textarea{resize:vertical;min-height:100px}
        .submit-btn{background:#3b82f6;color:white;border:none;padding:0.75rem 1.5rem;border-radius:8px;font-size:1rem;font-weight:500;cursor:pointer;transition:background-color 0.2s;width:100%}
        .submit-btn:hover{background:#2563eb}
        .submit-btn:disabled{background:#93c5fd;cursor:not-allowed}
        .messages-section{margin-top:2rem}
        .section-title{font-size:1.25rem;font-weight:600;color:#1e293b;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:2px solid #e2e8f0}
        .message-card{background:white;padding:1.25rem;border-radius:8px;box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);margin-bottom:1rem;transition:transform 0.2s}
        .message-card:hover{transform:translateY(-2px);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        .message-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
        .message-author{font-weight:600;color:#3b82f6}
        .message-time{font-size:0.875rem;color:#94a3b8}
        .message-content{color:#334155;line-height:1.6}
        .empty-state{text-align:center;padding:3rem;color:#94a3b8}
        .empty-state-icon{font-size:3rem;margin-bottom:1rem}
        .loading{text-align:center;padding:2rem;color:#64748b}
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 在线留言板</h1>
        
        <div class="form-card">
            <div class="form-group">
                <label for="name">你的昵称</label>
                <input type="text" id="name" placeholder="请输入你的昵称" required>
            </div>
            <div class="form-group">
                <label for="content">留言内容</label>
                <textarea id="content" placeholder="写下你想说的话..." required></textarea>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitMessage()">提交留言</button>
        </div>

        <div class="messages-section">
            <h2 class="section-title">全部留言</h2>
            <div id="messageList">
                <div class="loading">正在加载留言...</div>
            </div>
        </div>
    </div>

    <script>
        // ====================== 只需要修改这里的两个值 ======================
        const BIN_ID = "你的Bin ID"; // 替换成你自己的
        const API_KEY = "你的X-Master-Key"; // 替换成你自己的
        // ==================================================================

        // 页面加载完成后立即加载留言
        document.addEventListener('DOMContentLoaded', loadMessages);

        // 从云端加载所有留言
        async function loadMessages() {
            const messageList = document.getElementById('messageList');
            
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                
                if (!response.ok) throw new Error('加载失败');
                
                const data = await response.json();
                const messages = data.record || [];
                
                if (messages.length === 0) {
                    messageList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <p>还没有留言，快来抢沙发吧！</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                // 最新的留言显示在最上面
                messages.forEach(message => {
                    html += `
                        <div class="message-card">
                            <div class="message-header">
                                <span class="message-author">${escapeHtml(message.name)}</span>
                                <span class="message-time">${message.time}</span>
                            </div>
                            <div class="message-content">${escapeHtml(message.content)}</div>
                        </div>
                    `;
                });
                
                messageList.innerHTML = html;
                
            } catch (error) {
                messageList.innerHTML = `<div class="loading">加载留言失败，请刷新页面重试</div>`;
                console.error('加载错误:', error);
            }
        }

        // 提交新留言到云端
        async function submitMessage() {
            const nameInput = document.getElementById('name');
            const contentInput = document.getElementById('content');
            const submitBtn = document.getElementById('submitBtn');
            
            const name = nameInput.value.trim();
            const content = contentInput.value.trim();
            
            if (!name || !content) {
                alert('请填写昵称和留言内容');
                return;
            }
            
            // 禁用按钮防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = '正在提交...';
            
            try {
                // 先获取现有留言
                const getResponse = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                
                if (!getResponse.ok) throw new Error('提交失败');
                
                const data = await getResponse.json();
                const messages = data.record || [];
                
                // 添加新留言
                messages.unshift({
                    name: name,
                    content: content,
                    time: new Date().toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    })
                });
                
                // 保存到云端
                const putResponse = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(messages)
                });
                
                if (!putResponse.ok) throw new Error('提交失败');
                
                // 清空输入框
                nameInput.value = '';
                contentInput.value = '';
                
                // 立即刷新留言列表
                await loadMessages();
                
                // 滚动到留言列表顶部
                document.querySelector('.messages-section').scrollIntoView({ behavior: 'smooth' });
                
                alert('留言提交成功！');
                
            } catch (error) {
                alert('留言提交失败，请稍后再试');
                console.error('提交错误:', error);
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                submitBtn.textContent = '提交留言';
            }
        }

        // 防止XSS攻击，转义HTML特殊字符
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
